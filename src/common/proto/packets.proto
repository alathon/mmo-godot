syntax = "proto3";

enum DecayType {
  DECAY_LINEAR = 0;
  DECAY_EXPONENTIAL = 1;
}

message Impulse {
  float vel_x = 1;
  float vel_y = 2;
  float vel_z = 3;
  uint32 start_tick = 4;
  uint32 duration_ticks = 5;
  DecayType decay_type = 6;
}

// ─── Ability Input (client → server) ───────────────────────────────────────

message AbilityInput {
  string ability_id = 1;
  uint32 target_entity_id = 2; // 0 if self or ground
  float ground_x = 3;          // Only for ground target type
  float ground_y = 4;
  float ground_z = 5;
}

// ─── Target Selection (client → server) ────────────────────────────────────

message TargetSelect {
  uint32 target_entity_id = 1; // 0 = clear target
}

// ─── Ability Accepted / Rejected (server → casting player only) ────────────

message AbilityUseAccepted {
  string ability_id = 1;
  uint32 requested_tick = 2;
  uint32 start_tick = 3;
}

message AbilityUseRejected {
  string ability_id = 1;
  uint32 requested_tick = 2;
  uint32 cancel_reason = 3; // 0=moved, 1=interrupted, 2=stunned, 3=target_died, 4=invalid
}

// ─── Combat Events (server → all clients in zone, per tick) ─────────────────

enum HitType {
  HIT = 0;
  MISS = 1;
  DODGE = 2;
  CRIT = 3;
  BLOCK = 4;
  CRIT_BLOCK = 5;
}

message CombatEvent_AbilityUseStarted {
  uint32 source_entity_id = 1;
  string ability_id = 2;
  uint32 target_entity_id = 3;
  float ground_x = 4;
  float ground_y = 5;
  float ground_z = 6;
  float cast_time = 7;
}

message CombatEvent_AbilityUseCanceled {
  uint32 source_entity_id = 1;
  string ability_id = 2;
  uint32 cancel_reason = 3; // 0=moved, 1=interrupted, 2=stunned, 3=target_died, 4=invalid
}

message CombatEvent_AbilityUseCompleted {
  uint32 source_entity_id = 1;
  string ability_id = 2;
  HitType hit_type = 3;
}

message CombatEvent_DamageTaken {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  string ability_id = 3;
  float amount = 4;
}

message CombatEvent_HealingReceived {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  string ability_id = 3;
  float amount = 4;
}

message CombatEvent_BuffApplied {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  string ability_id = 3;
  string status_id = 4;
  uint32 stacks = 5;
  float remaining_duration = 6; // 0 = permanent
}

message CombatEvent_DebuffApplied {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  string ability_id = 3;
  string status_id = 4;
  uint32 stacks = 5;
  float remaining_duration = 6;
}

message CombatEvent_StatusEffectRemoved {
  uint32 entity_id = 1;
  string status_id = 2;
  uint32 remove_reason = 3; // 0=expired, 1=dispelled, 2=consumed
}

message CombatEvent_CombatantDied {
  uint32 entity_id = 1;
  uint32 killer_entity_id = 2;
}

message CombatEvent {
  uint32 tick = 1;
  oneof event {
    CombatEvent_AbilityUseStarted   ability_use_started   = 2;
    CombatEvent_AbilityUseCanceled  ability_use_canceled  = 3;
    CombatEvent_AbilityUseCompleted ability_use_completed = 4;
    CombatEvent_DamageTaken         damage_taken          = 5;
    CombatEvent_HealingReceived     healing_received      = 6;
    CombatEvent_BuffApplied         buff_applied          = 7;
    CombatEvent_DebuffApplied       debuff_applied        = 8;
    CombatEvent_StatusEffectRemoved status_effect_removed = 9;
    CombatEvent_CombatantDied       combatant_died        = 10;
  }
}

message CombatTickEvents {
  uint32 tick = 1;
  repeated CombatEvent events = 2;
}

message StatusEffectState {
  string status_id = 1;
  uint32 source_entity_id = 2;
  uint32 stacks = 3;
  float remaining_duration = 4; // 0 = permanent
}

// ────────────────────────────────────────────────────────────────────────────

message PlayerInput {
  float input_x = 1;
  float input_z = 2;
  bool jump_pressed = 3;
  uint32 tick = 4;
  float rot_y = 5;
  AbilityInput ability_input = 6; // Set when player activates/queues an ability
}

message EntityState {
  uint32 entity_id = 1;
  float pos_x = 2;
  float pos_y = 3;
  float pos_z = 4;
  float vel_x = 5;
  float vel_y = 6;
  float vel_z = 7;
  float rot_y = 8;
  Impulse active_impulse = 9;
  uint32 hp = 10;
  uint32 max_hp = 11;
  uint32 mana = 12;
  uint32 max_mana = 13;
  uint32 stamina = 14;
  uint32 max_stamina = 15;
}

message WorldDiff {
  uint32 tick = 1;
  repeated EntityState entities = 2;
}

message ClockPing {
  uint32 ping_id = 1;
  float client_time = 2;
}

message ClockPong {
  uint32 ping_id = 1;
  float client_time = 2;
  float server_time = 3;
  uint32 server_tick = 4;
}

message InputBatch {
  repeated PlayerInput inputs = 1;
}

// ── Zone transfer (server ↔ client, over ENet) ──────────────────────────────

// Server → Client: tells client to disconnect and reconnect to another server.
message ZoneRedirect {
  string zone_id = 1;
  string address = 2;
  uint32 port = 3;
  string transfer_token = 4;
}

// Client → Server: presented on connect to claim a pre-allocated transfer slot.
message ZoneArrival {
  string transfer_token = 1;
}

// Client → Orchestrator: request initial login and zone assignment.
message LoginRequest {
  string username = 1;
}

// Server → Client: authoritative spawn point, sent once after ZoneArrival is accepted.
message PlayerSpawn {
  float pos_x = 1;
  float pos_y = 2;
  float pos_z = 3;
  float rot_y = 4;
}

// ── Zone transfer (server ↔ orchestrator, over WebSocket) ────────────────────

// Shared player state transferred between servers during zone transitions.
message PlayerState {
  float pos_x = 1;
  float pos_y = 2;
  float pos_z = 3;
  float vel_x = 4;
  float vel_y = 5;
  float vel_z = 6;
  float rot_y = 7;
  // Future: stats, inventory, buffs, quest state, etc.
}

// Game-server → Orchestrator: register this server on startup.
message ZoneRegister {
  string zone_id = 1;
  string address = 2;
  uint32 port = 3;
  uint32 max_players = 4;
  uint32 current_players = 5;
}

// Game-server → Orchestrator: request a player transfer to another zone.
message ZoneTransferRequest {
  uint32 peer_id = 1;
  string from_zone_id = 2;
  string to_zone_id = 3;
  PlayerState player_state = 4;
  string entry_spawn_path = 5;
}

// Orchestrator → Game-server (destination): prepare for incoming player.
message PreparePlayer {
  string transfer_token = 1;
  PlayerState player_state = 2;
  string entry_spawn_path = 3;
}

// Game-server (destination) → Orchestrator: confirm ready for the player.
message PreparePlayerAck {
  string transfer_token = 1;
  bool accepted = 2;
}

// Orchestrator → Game-server (origin): redirect the client to the destination.
message ZoneTransferResponse {
  uint32 peer_id = 1;
  string transfer_token = 2;
  string target_address = 3;
  uint32 target_port = 4;
  string zone_id = 5;
}

// ── Top-level packet wrapper ─────────────────────────────────────────────────

message Packet {
  oneof payload {
    PlayerInput player_input = 1;
    WorldDiff world_diff = 2;
    ClockPing clock_ping = 3;
    ClockPong clock_pong = 4;
    InputBatch input_batch = 5;
    ZoneRedirect zone_redirect = 6;
    ZoneArrival zone_arrival = 7;
    LoginRequest login_request = 8;
    PlayerSpawn player_spawn = 9;
    TargetSelect target_select = 10;
    AbilityUseAccepted ability_accepted = 11;
    AbilityUseRejected ability_rejected = 12;
    CombatTickEvents combat_tick_events = 13;
  }
}

// Orchestrator → Game-server: heartbeat ping.
message Heartbeat {
  uint32 ping_id = 1;
}

// Game-server → Orchestrator: heartbeat response.
message HeartbeatAck {
  uint32 ping_id = 1;
}

// Orchestrator ↔ game-server messages use a separate wrapper since they travel
// over WebSocket, not ENet.
message OrchestratorPacket {
  oneof payload {
    ZoneRegister zone_register = 1;
    ZoneTransferRequest zone_transfer_request = 2;
    PreparePlayer prepare_player = 3;
    PreparePlayerAck prepare_player_ack = 4;
    ZoneTransferResponse zone_transfer_response = 5;
    Heartbeat heartbeat = 6;
    HeartbeatAck heartbeat_ack = 7;
  }
}
