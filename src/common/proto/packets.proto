syntax = "proto3";

enum DecayType {
  DECAY_LINEAR = 0;
  DECAY_EXPONENTIAL = 1;
}

message Impulse {
  float vel_x = 1;
  float vel_y = 2;
  float vel_z = 3;
  uint32 start_tick = 4;
  uint32 duration_ticks = 5;
  DecayType decay_type = 6;
}

message PlayerInput {
  float input_x = 1;
  float input_z = 2;
  bool jump_pressed = 3;
  uint32 tick = 4;
  float rot_y = 5;
}

message EntityState {
  uint32 entity_id = 1;
  float pos_x = 2;
  float pos_y = 3;
  float pos_z = 4;
  float vel_x = 5;
  float vel_y = 6;
  float vel_z = 7;
  float rot_y = 8;
  Impulse active_impulse = 9;
}

message WorldDiff {
  uint32 tick = 1;
  repeated EntityState entities = 2;
}

message ClockPing {
  uint32 ping_id = 1;
  float client_time = 2;
}

message ClockPong {
  uint32 ping_id = 1;
  float client_time = 2;
  float server_time = 3;
  uint32 server_tick = 4;
}

message InputBatch {
  repeated PlayerInput inputs = 1;
}

message Packet {
  oneof payload {
    PlayerInput player_input = 1;
    WorldDiff world_diff = 2;
    ClockPing clock_ping = 3;
    ClockPong clock_pong = 4;
    InputBatch input_batch = 5;
  }
}
