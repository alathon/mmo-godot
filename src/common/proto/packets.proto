syntax = "proto3";

message PlayerInput {
  float input_x = 1;
  float input_z = 2;
  bool jump_pressed = 3;
  uint32 tick = 4;
  float rot_y = 5;
}

message EntityState {
  uint32 entity_id = 1;
  float pos_x = 2;
  float pos_y = 3;
  float pos_z = 4;
  float vel_x = 5;
  float vel_y = 6;
  float vel_z = 7;
  float rot_y = 8;
}

message WorldDiff {
  uint32 tick = 1;
  repeated EntityState entities = 2;
}

message ClockPing {
  uint32 ping_id = 1;
  float client_time = 2;
}

message ClockPong {
  uint32 ping_id = 1;
  float client_time = 2;
  float server_time = 3;
  uint32 server_tick = 4;
}

message Packet {
  oneof payload {
    PlayerInput player_input = 1;
    WorldDiff world_diff = 2;
    ClockPing clock_ping = 3;
    ClockPong clock_pong = 4;
  }
}
