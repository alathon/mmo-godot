syntax = "proto3";

enum DecayType {
  DECAY_LINEAR = 0;
  DECAY_EXPONENTIAL = 1;
}

message Impulse {
  float vel_x = 1;
  float vel_y = 2;
  float vel_z = 3;
  uint32 start_tick = 4;
  uint32 duration_ticks = 5;
  DecayType decay_type = 6;
}

// ─── Ability Input (client → server) ───────────────────────────────────────

message AbilityInput {
  uint32 ability_id = 1;
  uint32 target_entity_id = 2; // 0 if self or ground
  float ground_x = 3;          // Only for ground target type
  float ground_y = 4;
  float ground_z = 5;
  uint32 request_id = 6;
}

// ─── Target Selection (client → server) ────────────────────────────────────

message TargetSelect {
  uint32 target_entity_id = 1; // 0 = clear target
}

// ─── Ability Accepted / Rejected (server → casting player only) ────────────

message AbilityUseAccepted {
  uint32 ability_id = 1;
  uint32 start_tick = 2;
  uint32 request_id = 3;
  uint32 resolve_tick = 4;
  uint32 finish_tick = 5;
  uint32 impact_tick = 6;
}

message AbilityUseRejected {
  uint32 cancel_reason = 1; // 0=moved, 1=interrupted, 2=stunned, 3=target_died, 4=invalid, 5=insufficient_resources
  uint32 request_id = 2;
}

enum ResolvedAbilityEffectKind {
  RESOLVED_EFFECT_DAMAGE = 0;
  RESOLVED_EFFECT_HEAL = 1;
  RESOLVED_EFFECT_STATUS = 2;
}

enum ResolvedAbilityEffectPhase {
  RESOLVED_EFFECT_IMPACT = 0;
  RESOLVED_EFFECT_EARLY = 1;
}

message ResolvedAbilityEffect {
  ResolvedAbilityEffectKind kind = 1;
  ResolvedAbilityEffectPhase phase = 2;
  uint32 target_entity_id = 3;
  HitType hit_type = 4;
  uint32 amount = 5;
  uint32 status_id = 6;
  float duration = 7;
  bool is_debuff = 8;
}

message AbilityUseResolved {
  uint32 ability_id = 1;
  uint32 start_tick = 2;
  uint32 request_id = 3;
  uint32 resolve_tick = 4;
  uint32 finish_tick = 5;
  uint32 impact_tick = 6;
  repeated ResolvedAbilityEffect effects = 7;
}

// ─── Entity Events (server → all clients in zone, per tick) ─────────────────

enum HitType {
  HIT = 0;
  MISS = 1;
  DODGE = 2;
  CRIT = 3;
  BLOCK = 4;
  CRIT_BLOCK = 5;
}

message EntityEvent_AbilityUseStarted {
  uint32 source_entity_id = 1;
  uint32 ability_id = 2;
  uint32 request_id = 3;
  uint32 target_entity_id = 4;
  float ground_x = 5;
  float ground_y = 6;
  float ground_z = 7;
  float cast_time = 8;
}

message EntityEvent_AbilityUseCanceled {
  uint32 source_entity_id = 1;
  uint32 ability_id = 2;
  uint32 cancel_reason = 3; // 0=moved, 1=interrupted, 2=stunned, 3=target_died, 4=invalid, 5=insufficient_resources
  uint32 request_id = 4;
}

message EntityEvent_AbilityUseFinished {
  uint32 source_entity_id = 1;
  uint32 ability_id = 2;
  uint32 request_id = 3;
}

message EntityEvent_AbilityUseImpact {
  uint32 source_entity_id = 1;
  uint32 ability_id = 2;
  uint32 request_id = 3;
}

message EntityEvent_DamageTaken {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  uint32 ability_id = 3;
  float amount = 4;
}

message EntityEvent_HealingReceived {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  uint32 ability_id = 3;
  float amount = 4;
}

message EntityEvent_BuffApplied {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  uint32 ability_id = 3;
  uint32 status_id = 4;
  uint32 stacks = 5;
  float remaining_duration = 6; // 0 = permanent
}

message EntityEvent_DebuffApplied {
  uint32 source_entity_id = 1;
  uint32 target_entity_id = 2;
  uint32 ability_id = 3;
  uint32 status_id = 4;
  uint32 stacks = 5;
  float remaining_duration = 6;
}

message EntityEvent_StatusEffectRemoved {
  uint32 entity_id = 1;
  uint32 status_id = 2;
  uint32 remove_reason = 3; // 0=expired, 1=dispelled, 2=consumed
}

message EntityEvent_CombatStarted {
  uint32 entity_id = 1;
  uint32 source_entity_id = 2;
}

message EntityEvent_CombatEnded {
  uint32 entity_id = 1;
}

message EntityEvent_CombatantDied {
  uint32 entity_id = 1;
  uint32 killer_entity_id = 2;
}

message EntityEvent {
  uint32 tick = 1;
  oneof event {
    EntityEvent_AbilityUseStarted   ability_use_started   = 2;
    EntityEvent_AbilityUseCanceled  ability_use_canceled  = 3;
    EntityEvent_AbilityUseFinished  ability_use_finished  = 4;
    EntityEvent_AbilityUseImpact    ability_use_impact    = 5;
    EntityEvent_DamageTaken         damage_taken          = 6;
    EntityEvent_HealingReceived     healing_received      = 7;
    EntityEvent_BuffApplied         buff_applied          = 8;
    EntityEvent_DebuffApplied       debuff_applied        = 9;
    EntityEvent_StatusEffectRemoved status_effect_removed = 10;
    EntityEvent_CombatantDied       combatant_died        = 11;
    EntityEvent_CombatStarted       combat_started        = 12;
    EntityEvent_CombatEnded         combat_ended          = 13;
  }
}

message StatusEffectState {
  uint32 status_id = 1;
  uint32 source_entity_id = 2;
  uint32 stacks = 3;
  float remaining_duration = 4; // 0 = permanent
}

// ────────────────────────────────────────────────────────────────────────────

message PlayerInput {
  float input_x = 1;
  float input_z = 2;
  bool jump_pressed = 3;
  uint32 tick = 4;
  float rot_y = 5;
  AbilityInput ability_input = 6; // Set when player activates/queues an ability
}

message EntityPosition {
  uint32 entity_id = 1;
  float pos_x = 2;
  float pos_y = 3;
  float pos_z = 4;
  float vel_x = 5;
  float vel_y = 6;
  float vel_z = 7;
  float rot_y = 8;
  Impulse active_impulse = 9;
  bool is_on_floor = 10;
}

message WorldPositions {
  uint32 tick = 1;
  repeated EntityPosition entities = 2;
}

// Per-entity vitals snapshot (server → all clients, reliable each tick).
message ServerEntityState {
  uint32 entity_id = 1;
  uint32 hp = 2;
  uint32 max_hp = 3;
  uint32 mana = 4;
  uint32 max_mana = 5;
  uint32 stamina = 6;
  uint32 max_stamina = 7;
}

// Reliable per-tick broadcast: vitals + any entity events.
message WorldState {
  uint32 tick = 1;
  repeated ServerEntityState entities = 2;
  repeated EntityEvent events = 3;
}

message ClockPing {
  uint32 ping_id = 1;
  float client_time = 2;
}

message ClockPong {
  uint32 ping_id = 1;
  float client_time = 2;
  float server_time = 3;
  uint32 server_tick = 4;
}

message InputBatch {
  repeated PlayerInput inputs = 1;
}

// ── Zone transfer (server ↔ client, over ENet) ──────────────────────────────

// Server → Client: tells client to disconnect and reconnect to another server.
message ZoneRedirect {
  string zone_id = 1;
  string address = 2;
  uint32 port = 3;
  string transfer_token = 4;
}

// Client → Server: presented on connect to claim a pre-allocated transfer slot.
message ZoneArrival {
  string transfer_token = 1;
}

// Client → Orchestrator: request initial login and zone assignment.
message LoginRequest {
  string username = 1;
}

// Server → Client: authoritative spawn point, sent once after ZoneArrival is accepted.
message PlayerSpawn {
  float pos_x = 1;
  float pos_y = 2;
  float pos_z = 3;
  float rot_y = 4;
}

// ── Zone transfer (server ↔ orchestrator, over WebSocket) ────────────────────

// Shared player state transferred between servers during zone transitions.
message PlayerState {
  float pos_x = 1;
  float pos_y = 2;
  float pos_z = 3;
  float vel_x = 4;
  float vel_y = 5;
  float vel_z = 6;
  float rot_y = 7;
  // Future: stats, inventory, buffs, quest state, etc.
}

// Game-server → Orchestrator: register this server on startup.
message ZoneRegister {
  string zone_id = 1;
  string address = 2;
  uint32 port = 3;
  uint32 max_players = 4;
  uint32 current_players = 5;
}

// Game-server → Orchestrator: request a player transfer to another zone.
message ZoneTransferRequest {
  uint32 peer_id = 1;
  string from_zone_id = 2;
  string to_zone_id = 3;
  PlayerState player_state = 4;
  string entry_spawn_path = 5;
}

// Orchestrator → Game-server (destination): prepare for incoming player.
message PreparePlayer {
  string transfer_token = 1;
  PlayerState player_state = 2;
  string entry_spawn_path = 3;
}

// Game-server (destination) → Orchestrator: confirm ready for the player.
message PreparePlayerAck {
  string transfer_token = 1;
  bool accepted = 2;
}

// Orchestrator → Game-server (origin): redirect the client to the destination.
message ZoneTransferResponse {
  uint32 peer_id = 1;
  string transfer_token = 2;
  string target_address = 3;
  uint32 target_port = 4;
  string zone_id = 5;
}

// ── Top-level packet wrapper ─────────────────────────────────────────────────

message Packet {
  oneof payload {
    PlayerInput player_input = 1;
    WorldPositions world_positions = 2;
    ClockPing clock_ping = 3;
    ClockPong clock_pong = 4;
    InputBatch input_batch = 5;
    ZoneRedirect zone_redirect = 6;
    ZoneArrival zone_arrival = 7;
    LoginRequest login_request = 8;
    PlayerSpawn player_spawn = 9;
    TargetSelect target_select = 10;
    AbilityUseAccepted ability_accepted = 11;
    AbilityUseRejected ability_rejected = 12;
    WorldState world_state = 13;
    AbilityUseResolved ability_resolved = 14;
  }
}

// Orchestrator → Game-server: heartbeat ping.
message Heartbeat {
  uint32 ping_id = 1;
}

// Game-server → Orchestrator: heartbeat response.
message HeartbeatAck {
  uint32 ping_id = 1;
}

// Orchestrator ↔ game-server messages use a separate wrapper since they travel
// over WebSocket, not ENet.
message OrchestratorPacket {
  oneof payload {
    ZoneRegister zone_register = 1;
    ZoneTransferRequest zone_transfer_request = 2;
    PreparePlayer prepare_player = 3;
    PreparePlayerAck prepare_player_ack = 4;
    ZoneTransferResponse zone_transfer_response = 5;
    Heartbeat heartbeat = 6;
    HeartbeatAck heartbeat_ack = 7;
  }
}
